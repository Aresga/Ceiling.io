services:
  ceilingio-base-build:
    build:
      context: .
      dockerfile: Dockerfile.base
      target: build
    image: ceilingio/base:build

  ceilingio-base-runtime:
    build:
      context: .
      dockerfile: Dockerfile.base
      target: runtime
    image: ceilingio/base:runtime

  ceilingio-server:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ceilingio-server:prod
    depends_on:
      - ceilingio-base-build
      - ceilingio-base-runtime
    ports:
      - "8080:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    
networks:
  default:
    name: mastering_webapp_network
    external: true
